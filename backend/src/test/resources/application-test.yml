spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.us-east-1.amazonaws.com/test-pool
          jwk-set-uri: https://cognito-idp.us-east-1.amazonaws.com/test-pool/.well-known/jwks.json

app:
  internal-api-key: test-api-key
