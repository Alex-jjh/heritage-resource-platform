spring:
  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT}:3306/heritage
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-change-in-production-must-be-at-least-256-bits-long!!}
    expiration-ms: 3600000
  internal-api-key: ${INTERNAL_API_KEY:default-key}
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:3000}
  storage:
    upload-dir: /opt/heritage/uploads
    thumbnail-dir: /opt/heritage/thumbnails
    base-url: ${STORAGE_BASE_URL:}
