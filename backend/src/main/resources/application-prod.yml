spring:
  datasource:
    url: jdbc:mysql://localhost:3306/heritage_db
    username: heritage
    password: ${DB_PASSWORD}
  flyway:
    enabled: true

aws:
  s3:
    bucket: ${S3_BUCKET}
    region: ${AWS_REGION}

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-change-in-production-must-be-at-least-256-bits-long!!}
    expiration-ms: 3600000
  internal-api-key: ${INTERNAL_API_KEY:default-key}
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:3000}
