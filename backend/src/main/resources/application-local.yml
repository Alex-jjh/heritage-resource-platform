spring:
  datasource:
    url: jdbc:mysql://localhost:3306/heritage
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

app:
  jwt:
    secret: local-dev-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256!!
    expiration-ms: 3600000
  cors:
    allowed-origin: http://localhost:3000
  storage:
    upload-dir: ./uploads
    thumbnail-dir: ./thumbnails
    base-url: http://localhost:8080
