name: Deploy to Alibaba Cloud ECS
# First deployment trigger

on:
  push:
    branches: [feature/aliyun-migration]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend JAR
        working-directory: backend
        run: mvn clean package -DskipTests -q

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy backend to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: backend/target/heritage-platform-0.0.1-SNAPSHOT.jar
          target: /opt/heritage/app/
          strip_components: 2

      - name: Deploy frontend to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: frontend/.next/standalone/,frontend/.next/static/,frontend/public/
          target: /opt/heritage/app/frontend/
          strip_components: 1

      - name: Assemble frontend and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            # Copy static assets into standalone directory where Next.js expects them
            cp -r /opt/heritage/app/frontend/.next/static /opt/heritage/app/frontend/.next/standalone/.next/static
            cp -r /opt/heritage/app/frontend/public /opt/heritage/app/frontend/.next/standalone/public
            
            sudo systemctl restart heritage-backend
            sleep 10
            sudo systemctl restart heritage-frontend
            sudo systemctl is-active heritage-backend
            sudo systemctl is-active heritage-frontend
