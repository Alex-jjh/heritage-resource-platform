server {
    listen 80;
    server_name _;

    client_max_body_size 55M;

    # API reverse proxy → Spring Boot
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
    }
    location /v3/api-docs {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
    }

    # Uploaded files (served directly by Nginx)
    location /files/uploads/ {
        alias /opt/heritage/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Thumbnails (served directly by Nginx)
    location /files/thumbnails/ {
        alias /opt/heritage/thumbnails/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Avatars (served directly by Nginx)
    location /files/avatars/ {
        alias /opt/heritage/avatars/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js static assets (served directly by Nginx for performance)
    location /_next/static/ {
        alias /opt/heritage/app/frontend/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js standalone server
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
